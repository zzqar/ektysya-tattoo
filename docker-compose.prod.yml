services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    volumes:
      - sqlite-data:/var/www/database
      - storage-data:/var/www/storage/app
    networks:
      - app-network
    environment:
      APP_ENV: production
      APP_DEBUG: false

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app-network
    depends_on:
      - app

volumes:
  sqlite-data:
  storage-data:

networks:
  app-network:
    driver: bridge
